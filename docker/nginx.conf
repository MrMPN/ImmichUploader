server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Same-origin relay for arbitrary Immich URLs entered in the UI.
    # Example:
    #   /__immich_proxy/https/fotos.example.com/immich/api/albums
    # -> https://fotos.example.com/immich/api/albums
    location ~ ^/__immich_proxy/(https?)/([^/]+)(/.*)$ {
        set $immich_scheme $1;
        set $immich_host $2;
        set $immich_path $3;

        proxy_pass $immich_scheme://$immich_host$immich_path$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $immich_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $immich_scheme;
        proxy_set_header X-Forwarded-Host $immich_host;
        proxy_redirect ~^https://([^/]+)(/.*)$ /__immich_proxy/https/$1$2;
        proxy_redirect ~^http://([^/]+)(/.*)$ /__immich_proxy/http/$1$2;
        proxy_redirect ~^https://([^/]+)$ /__immich_proxy/https/$1/;
        proxy_redirect ~^http://([^/]+)$ /__immich_proxy/http/$1/;
        proxy_redirect ~^//([^/]+)(/.*)$ /__immich_proxy/$immich_scheme/$1$2;
        proxy_redirect ~^//([^/]+)$ /__immich_proxy/$immich_scheme/$1/;
        proxy_redirect ~^(/.*)$ /__immich_proxy/$immich_scheme/$immich_host$1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 0;
    }

    location ~* \.(?:js|css|wasm|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
