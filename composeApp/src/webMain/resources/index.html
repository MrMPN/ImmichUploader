<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmichUploader</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<input id="local-file-input" type="file" multiple accept="image/*,video/*"/>
<div id="boot-loader" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#c4d3ec" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#0b57d0" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="92 122"/>
    </svg>
</div>
<script type="application/javascript" src="composeApp.js"></script>
<script>
    const loader = document.getElementById("boot-loader");
    const stopLoaderWhenReady = window.setInterval(() => {
        if (document.querySelector("canvas")) {
            loader.style.opacity = "0";
            window.clearInterval(stopLoaderWhenReady);
            window.setTimeout(() => loader.remove(), 260);
        }
    }, 120);
</script>
</body>
</html>
